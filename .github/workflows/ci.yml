name: bootstrapctl-ci

on:
  # 日常开发阶段：代码提交和 PR 都执行测试与双架构构建。
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 执行单元测试
        run: go test ./...

  build:
    name: Build Linux ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 生成 Linux 二进制
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          VERSION: snapshot-${{ github.sha }}
        run: |
          mkdir -p dist/linux-${GOARCH}
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/yuanyp8/bootstrapctl/internal/app.version=${VERSION}" \
            -o dist/linux-${GOARCH}/bootstrapctl \
            ./cmd/bootstrapctl
          tar -C dist/linux-${GOARCH} -czf dist/bootstrapctl_${VERSION}_linux_${GOARCH}.tar.gz bootstrapctl
          sha256sum dist/bootstrapctl_${VERSION}_linux_${GOARCH}.tar.gz > dist/bootstrapctl_${VERSION}_linux_${GOARCH}.tar.gz.sha256

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: bootstrapctl-linux-${{ matrix.goarch }}
          path: |
            dist/bootstrapctl_*_linux_${{ matrix.goarch }}.tar.gz
            dist/bootstrapctl_*_linux_${{ matrix.goarch }}.tar.gz.sha256
