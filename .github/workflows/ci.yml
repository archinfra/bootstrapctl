name: bootstrapctl-ci

on:
  # 日常开发阶段：代码提交和 PR 都执行测试与双架构构建。
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 执行单元测试
        run: go test ./...

  build:
    name: Build Linux Artifacts
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 生成 Linux 双架构构建产物
        env:
          VERSION: snapshot-${{ github.sha }}
        run: |
          chmod +x ./build.sh
          VERSION="${VERSION}" bash ./build.sh

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: bootstrapctl-linux-artifacts
          path: |
            dist/*.tar.gz
            dist/checksums.txt
